name: CodeQL

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: '23 4 * * 1'

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language:
          - cpp
          - actions

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Build host test target
        if: matrix.language == 'cpp'
        run: make -C test clean test_handlers

      - name: Analyze
        uses: github/codeql-action/analyze@v3
